services:
  - type: web
    name: vetagent-internal
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    rootDir: .
    buildCommand: npm ci && npm run build --workspace @central-vet/internal
    startCommand: npm run start --workspace @central-vet/internal -- -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VET_ADMIN_PASSCODE
        sync: false
      - key: VET_APP_ADMIN_PASSCODE
        sync: false
      - key: VET_VETERINARIAN_PASSCODE
        sync: false
      - key: HOSPITAL_NAME
        value: Central Veterinary Hospital
      - key: APP_TIME_ZONE
        value: America/Los_Angeles
      - key: MOCK_MODE
        value: "true"
      - key: AGENT_RUNTIME
        value: mock
      - key: NOTIFICATION_MODE
        value: disabled
      - key: NOTIFICATION_CHANNEL
        value: email
      - key: OVERDUE_CHECK_HOUR
        value: "18"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Central Veterinary Hospital <notifications@example.com>
      - key: DOCTOR_NOTIFICATION_EMAILS
        sync: false
      - key: TEST_NOTIFICATION_EMAIL
        sync: false
      - key: SMS_NOTIFICATION_RECIPIENTS
        sync: false
      - key: TEST_SMS_NOTIFICATION_RECIPIENTS
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: INTERNAL_BASE_URL
        value: https://vetagent-internal.onrender.com

  - type: web
    name: vetagent-client
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    rootDir: .
    buildCommand: npm ci && npm run build --workspace @central-vet/client-request
    startCommand: npm run start --workspace @central-vet/client-request -- -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: HOSPITAL_NAME
        value: Central Veterinary Hospital
      - key: APP_TIME_ZONE
        value: America/Los_Angeles
      - key: MOCK_MODE
        value: "true"
      - key: AGENT_RUNTIME
        value: mock
      - key: CLIENT_REQUEST_BASE_URL
        value: https://vetagent-client.onrender.com
      - key: CLIENT_REQUEST_HOST
        value: vetagent-client.onrender.com

  - type: cron
    name: vetagent-overdue-summary
    runtime: node
    plan: free
    region: oregon
    schedule: "0 2 * * *"
    rootDir: .
    buildCommand: npm ci
    startCommand: >-
      node -e "const url=process.env.INTERNAL_BASE_URL + '/api/notifications/overdue'; fetch(url,{headers:{authorization:'Bearer '+process.env.CRON_SECRET}}).then(async r=>{const text=await r.text(); console.log(r.status,text); if(!r.ok) process.exit(1);}).catch((error)=>{console.error(error); process.exit(1);})"
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: INTERNAL_BASE_URL
        value: https://vetagent-internal.onrender.com
      - key: CRON_SECRET
        sync: false
