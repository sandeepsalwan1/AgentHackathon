name: Opsera Render Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Trigger Render deploy hooks after validation
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    name: install, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Optional migration check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            npm run db:migrate
          else
            echo "DATABASE_URL secret not set; skipping migration check."
          fi

  deploy:
    name: manual approval, Render deploy
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy }}
    environment: production
    steps:
      - name: Trigger Render deploy hooks
        env:
          RENDER_INTERNAL_DEPLOY_HOOK_URL: ${{ secrets.RENDER_INTERNAL_DEPLOY_HOOK_URL }}
          RENDER_CLIENT_DEPLOY_HOOK_URL: ${{ secrets.RENDER_CLIENT_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_INTERNAL_DEPLOY_HOOK_URL" ] && [ -z "$RENDER_CLIENT_DEPLOY_HOOK_URL" ]; then
            echo "No Render deploy hook secrets configured."
            exit 1
          fi
          if [ -n "$RENDER_INTERNAL_DEPLOY_HOOK_URL" ]; then
            curl --fail --silent --show-error --request POST "$RENDER_INTERNAL_DEPLOY_HOOK_URL"
          fi
          if [ -n "$RENDER_CLIENT_DEPLOY_HOOK_URL" ]; then
            curl --fail --silent --show-error --request POST "$RENDER_CLIENT_DEPLOY_HOOK_URL"
          fi
